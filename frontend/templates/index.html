<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIS-SSH-ON</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
</head>

<body>
    <header>
        <h1>VIS-SSH-ON</h1>
        <div class="header-actions">
            <button id="flash-btn" class="action-btn" data-state="idle">⬡ FLASH CODE</button>
            <button id="serial-btn" class="action-btn">⎃ SERIAL</button>
            <button id="editor-btn" class="action-btn">✎ EDIT CODE</button>
        </div>
    </header>

    <main>
        <div class="status-bar">
            Status: <span id="status" class="disconnected">Disconnected</span>
        </div>
        <div class="viewport">
            <img id="image" height="400" />
            <canvas id="heatmap" width="8" height="8"></canvas>
        </div>

        <!-- ── Controls ─────────────────────────────────────────── -->
        <div class="controls-row">
            <div class="controls">
                <button id="run-test-btn" class="action-btn">▶ RUN TEST</button>
                <button id="stop-btn" class="action-btn" style="display:none">■ STOP TEST</button>
            </div>

            <!-- Camera PTZ Control -->
            <div class="cam-ctrl" id="cam-ctrl">
                <div class="cam-ctrl-label">⬡ CAM CONTROLLER</div>

                <div class="cam-ctrl-body">
                    <div class="cam-dpad">
                        <button class="dpad-btn dpad-up"     data-dir="up"    aria-label="Tilt Up"></button>
                        <button class="dpad-btn dpad-left"   data-dir="left"  aria-label="Pan Left"></button>
                        <button class="dpad-btn dpad-center" data-dir="home"  aria-label="Home / Center" title="HOME"></button>
                        <button class="dpad-btn dpad-right"  data-dir="right" aria-label="Pan Right"></button>
                        <button class="dpad-btn dpad-down"   data-dir="down"  aria-label="Tilt Down"></button>
                    </div>

                    <div class="cam-side">
                        <div class="cam-zoom">
                            <button class="zoom-btn" data-dir="zoom-in"  aria-label="Zoom In">+</button>
                            <span class="zoom-label">ZOOM</span>
                            <button class="zoom-btn" data-dir="zoom-out" aria-label="Zoom Out">−</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="test-panel">
            <div id="test-status">IDLE</div>
            <div id="test-metrics"></div>
        </div>
    </footer>

    <!-- ── Flash output modal ──────────────────────────────────────────────── -->
    <div id="flash-modal" style="display:none; position:fixed; inset:0; z-index:9999;
                background:rgba(0,0,0,.9); align-items:center; justify-content:center;">
        <div class="flash-shell">
            <div class="flash-bar">
                <span class="flash-bar-title">PIO UPLOAD OUTPUT</span>
                <button id="flash-close" class="bar-close">✕</button>
            </div>
            <div id="flash-output" class="flash-output"></div>
            <div class="flash-footer">
                <span id="flash-status" class="flash-status"></span>
            </div>
        </div>
    </div>

    <!-- ── Serial monitor modal ────────────────────────────────────────────── -->
    <div id="serial-modal" style="display:none; position:fixed; inset:0; z-index:9999;
                background:rgba(0,0,0,.9); align-items:center; justify-content:center;">
        <div class="serial-shell">
            <div class="serial-bar">
                <span class="serial-bar-title">SERIAL MONITOR</span>
                <div class="serial-bar-controls">
                    <label class="serial-label">BAUD
                        <select id="serial-baud" class="serial-select">
                            <option value="9600">9600</option>
                            <option value="19200">19200</option>
                            <option value="38400">38400</option>
                            <option value="57600">57600</option>
                            <option value="115200" selected>115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                        </select>
                    </label>
                    <label class="serial-label serial-label-check">
                        <input id="serial-timestamps" type="checkbox" />
                        Time Stamps
                    </label>
                    <button id="serial-clear" class="serial-ctrl-btn">CLR</button>
                    <button id="serial-stop"  class="serial-ctrl-btn stop" style="display:none">■ STOP</button>
                    <button id="serial-close" class="bar-close">✕</button>
                </div>
            </div>
            <div id="serial-output" class="serial-output"></div>
            <div class="serial-footer">
                <span id="serial-status" class="serial-status"></span>
            </div>
        </div>
    </div>

    <!-- ── Editor modal ────────────────────────────────────────────────────── -->
    <div id="editor-modal" style="display:none; position:fixed; inset:0; z-index:9999;
                background:rgba(0,0,0,0.88); align-items:center; justify-content:center;">
        <div class="editor-shell">

            <!-- Screen A: file picker -->
            <div id="screen-picker" style="display:flex; flex-direction:column; height:100%;">
                <div class="modal-bar">
                    <span class="bar-title">SELECT A FILE TO EDIT</span>
                    <div class="bar-right">
                        <button class="bar-new" id="toggle-new-file">+ NEW FILE</button>
                        <button class="bar-close" id="close-picker">✕</button>
                    </div>
                </div>
                <div id="new-file-row" class="new-file-row" style="display:none;">
                    <input id="new-file-input" class="new-file-input" type="text" placeholder="e.g. src/sensors.cpp"
                        spellcheck="false" autocomplete="off" />
                    <button id="new-file-confirm" class="bar-new confirm">CREATE</button>
                    <span id="new-file-err" class="new-file-err"></span>
                </div>
                <div id="file-list" class="file-list"></div>
            </div>

            <!-- Screen B: editor -->
            <div id="screen-editor" style="display:none; flex-direction:column; height:100%;">
                <div class="modal-bar">
                    <div class="bar-left">
                        <button class="bar-back" id="back-btn">← FILES</button>
                        <span class="bar-file" id="bar-filename"></span>
                    </div>
                    <div class="bar-right">
                        <span id="save-status" class="save-status"></span>
                        <button class="bar-save" id="save-btn">SAVE</button>
                        <button class="bar-close" id="close-editor">✕</button>
                    </div>
                </div>
                <div class="cm-wrap">
                    <textarea id="code-editor"></textarea>
                </div>
                <div class="editor-hint">Ctrl+S · save &nbsp;|&nbsp; Esc · close</div>
            </div>

        </div>
    </div>

    <!-- ── Test config modal ──────────────────────────────────────────────── -->
    <div id="test-modal" style="display:none; position:fixed; inset:0; z-index:9999;
                background:rgba(0,0,0,.9); align-items:center; justify-content:center;">
        <div class="test-shell">
            <div class="modal-bar">
                <span class="bar-title">CONFIGURE TEST</span>
                <button id="close-test-modal" class="bar-close">✕</button>
            </div>
            <div class="test-form">

                <label>Test Name
                    <input id="test-name" type="text" placeholder="e.g. Thermal Stress Run" />
                </label>

                <label class="checkbox-label">
                    <input id="enable-thermal" type="checkbox" checked />
                    Enable Thermal Check
                </label>

                <div id="thermal-options">
                    <label>Max Temperature (°C)
                        <input id="max-temp" type="number" value="75" min="0" max="200" />
                    </label>
                    <label class="checkbox-label">
                        <input id="require-pixel-change" type="checkbox" checked />
                        Require Pixel Change
                    </label>
                </div>

                <label>Duration (seconds)
                    <input id="test-duration" type="number" value="0" min="0" />
                    <span class="hint">0 = run until manually stopped</span>
                </label>

                <div class="failure-criteria">
                    <strong>When does a test fail?</strong>
                    <ul>
                        <li>Temperature exceeds the Max Temperature threshold on any sample</li>
                        <li>Pixel change is required but it does not</li>
                    </ul>
                </div>

                <button id="start-test-btn" class="action-btn">▶ START TEST</button>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="/static/script.js"></script>
    <script src="/static/editor.js"></script>
    <script src="/static/flash.js"></script>
    <script src="/static/ptz.js"></script>
    <script src="/static/serial.js"></script>
</body>

</html>
