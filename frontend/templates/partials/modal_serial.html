<!-- ── Serial monitor modal ────────────────────────────────────────────── -->
    <div id="serial-modal" style="display:none; position:fixed; inset:0; z-index:9999;
                background:rgba(0,0,0,.9); align-items:center; justify-content:center;">
        <div class="serial-shell">
            <div class="serial-bar">
                <span class="serial-bar-title">SERIAL MONITOR</span>
                <div class="serial-bar-controls">
                    <label class="serial-label">BAUD
                        <select id="serial-baud" class="serial-select">
                            <option value="9600">9600</option>
                            <option value="19200">19200</option>
                            <option value="38400">38400</option>
                            <option value="57600">57600</option>
                            <option value="115200" selected>115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                        </select>
                    </label>
                    <label class="serial-label serial-label-check">
                        <input id="serial-timestamps" type="checkbox" />
                        Time Stamps
                    </label>
                    <button id="serial-clear" class="serial-ctrl-btn">CLR</button>
                    <button id="serial-stop"  class="serial-ctrl-btn stop" style="display:none">■ STOP</button>
                    <button id="serial-close" class="bar-close">✕</button>
                </div>
            </div>
            <div id="serial-output" class="serial-output"></div>
            <div class="serial-footer">
                <span id="serial-status" class="serial-status"></span>
            </div>
        </div>
    </div>
