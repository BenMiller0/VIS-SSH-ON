<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIS-SSH-ON ALPHA</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
</head>
<body>
  <div class="terminal">
    <header>
      <span>VIS-SSH-ON ALPHA</span>
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="status-text">CONNECTING</span>
      </div>
      <button id="editor-btn" class="editor-btn">EDIT CODE</button>
    </header>
    <div class="viewport">
      <img id="feed"/>
      <canvas id="thermal"></canvas>
      <div id="temp-range" class="temp-range"></div>
    </div>
  </div>

  <div id="editor-modal" class="editor-modal">
    <div class="editor-content">
      <div class="editor-header">
        <h2>Embedded Software Editor</h2>
        <select id="file-select" class="file-select"></select>
        <button id="close-editor" class="close-btn">×</button>
      </div>
      <div class="editor-body">
        <textarea id="code-editor"></textarea>
      </div>
      <div class="editor-footer">
        <button id="save-btn" class="save-btn">SAVE</button>
        <span id="save-status" class="save-status"></span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
  <script src="/static/script.js"></script>
  <script src="/static/editor.js"></script>
</body>
</html>
